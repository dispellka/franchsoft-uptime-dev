# Franchsoft DEV Uptime Monitoring
# Положить как .upptimerc.yml в корень репо franchsoft-uptime-dev

owner: dispellka
repo: franchsoft-uptime-dev

sites:
  - name: API (Franchsoft DEV)
    url: https://api.franchsoft.online/api/health
    expectedStatusCodes:
      - 200
  - name: Admin (Franchsoft DEV)
    url: https://admin.franchsoft.online
    expectedStatusCodes:
      - 200
      - 301
      - 302
  - name: Loyalty Landing DEV
    url: https://loyalty.franchsoft.online
    expectedStatusCodes:
      - 200
      - 301
      - 302
  - name: Legal Docs DEV
    url: https://docs.franchsoft.online
    expectedStatusCodes:
      - 200
      - 301
      - 302

assignees:
  - dispellka

status-website:
  name: Franchsoft DEV Status
  introTitle: Franchsoft — DEV
  introMessage: Статус сервисов Franchsoft в dev-окружении.
  theme: dark

i18n:
  activeIncidents: Активные инциденты
  allSystemsOperational: Все сервисы работают
  incidentReport: Отчёт об инциденте
  down: Недоступен
  up: Работает
  degraded: Деградация

workflowSchedule:
  uptime: "2-59/5 * * * *"
